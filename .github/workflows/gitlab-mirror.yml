name: Mirror GitLab to GitHub

# Triggered by GitLab via repository_dispatch event
# when a merge to main happens on GitLab.
# This workflow clones the GitLab repo and force-pushes to GitHub.
#
# Required secrets (set in GitHub repo → Settings → Secrets):
#   GITLAB_TOKEN  → GitLab PAT with read_repository scope
#   GH_TOKEN      → GitHub PAT with repo, workflow scope
#
# Required variables (set in GitHub repo → Settings → Variables):
#   GITLAB_REPO   → e.g. xplasma/website/xsynva-global  (the GitLab path)

on:
  repository_dispatch:
    types: [gitlab-push]

jobs:
  mirror:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Mirror GitLab → GitHub
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
          GITLAB_REPO: ${{ vars.GITLAB_REPO }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git clone --mirror \
            "https://oauth2:${GITLAB_TOKEN}@gitlab.com/${GITLAB_REPO}.git" \
            repo.git
          cd repo.git

          git remote add github \
            "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"

          # We ONLY push heads (branches) and tags. Ignore internal GitLab refs.
          git push github --force --prune 'refs/heads/*:refs/heads/*'
          git push github --force --tags

          echo "✅ Clean mirror complete."
