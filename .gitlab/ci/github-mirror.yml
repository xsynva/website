# Triggers GitHub Actions mirror workflow on every merge to main.
# GitHub clones this GitLab repo and force-pushes to xsynva/website.
# GH_TOKEN must be set in GitLab CI/CD variables for this repo.

trigger_github_mirror:
  stage: trigger
  image: alpine:latest

  before_script:
    - apk add --no-cache curl

  script:
    - echo "Triggering GitHub mirror for xsynva/website..."
    - |
      curl -s -X POST \
        -H "Accept: application/vnd.github+json" \
        -H "Authorization: token $GH_TOKEN" \
        https://api.github.com/repos/xsynva/website/dispatches \
        -d '{"event_type": "gitlab-push"}'
    - echo "✅ Mirror trigger sent"

  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: always
    - when: never
