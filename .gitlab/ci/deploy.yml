deploy_production:
  stage: deploy
  image: node:20-alpine
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
  script:
    - npm install -g wrangler
    - wrangler pages deploy . --project-name=website/xsynva-global --branch=main
  environment:
    name: production
    url: https://xsynva.com